name: Build And Stage

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

concurrency:
  group: build-stage-develop
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA}"
          IMAGE_REF="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod-distroless
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Create release manifest
        run: |
          cat <<EOF > release-manifest.json
          {
            "commit": "${GITHUB_SHA}",
            "services": {
              "api": {
                "image": "${{ steps.meta.outputs.image_ref }}",
                "digest": "${{ steps.build.outputs.digest }}"
              }
            }
          }
          EOF

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json

  deploy_stage:
    needs: build
    runs-on: self-hosted
    environment:
      name: stage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print release info
        run: |
          echo "commit=${GITHUB_SHA}"
          echo "image=${{ needs.build.outputs.image_ref }}"
          echo "digest=${{ needs.build.outputs.image_digest }}"

      - name: Sync stage app secret
        run: |
          kubectl create secret generic coffee-app-secrets \
            --namespace coffee-stage \
            --from-literal=DATABASE_USER='${{ secrets.DATABASE_USER }}' \
            --from-literal=DATABASE_PASSWORD='${{ secrets.DATABASE_PASSWORD }}' \
            --from-literal=DATABASE_NAME='${{ secrets.DATABASE_NAME }}' \
            --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            --from-literal=JWT_REFRESH_SECRET='${{ secrets.JWT_REFRESH_SECRET }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync stage GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-creds \
            --namespace coffee-stage \
            --docker-server=ghcr.io \
            --docker-username='${{ secrets.GHCR_USERNAME }}' \
            --docker-password='${{ secrets.GHCR_TOKEN }}' \
            --docker-email='ci@example.local' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply stage manifests
        run: kubectl apply -k k8s/stage

      - name: Update stage image
        run: |
          kubectl set image deployment/coffee-api \
            api=${{ needs.build.outputs.image_ref }} \
            --namespace coffee-stage

      - name: Wait for stage rollout
        run: |
          kubectl rollout status deployment/coffee-api \
            --namespace coffee-stage \
            --timeout=180s

      - name: Smoke check stage API
        run: |
          kubectl port-forward service/coffee-api 18080:80 \
            --namespace coffee-stage \
            >/tmp/coffee-stage-port-forward.log 2>&1 &
          PORT_FORWARD_PID=$!
          trap 'kill ${PORT_FORWARD_PID}' EXIT
          sleep 5
          curl --fail --silent --show-error http://127.0.0.1:18080/ >/dev/null
