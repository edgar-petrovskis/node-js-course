name: Build And Stage

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

concurrency:
  group: build-stage-develop
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA}"
          IMAGE_REF="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod-distroless
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Create release manifest
        run: |
          cat <<EOF > release-manifest.json
          {
            "commit": "${GITHUB_SHA}",
            "services": {
              "api": {
                "image": "${{ steps.meta.outputs.image_ref }}",
                "digest": "${{ steps.build.outputs.digest }}"
              }
            }
          }
          EOF

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json

  deploy_stage:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: stage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release manifest
        uses: actions/download-artifact@v4
        with:
          name: release-manifest

      - name: Print release info
        run: |
          echo "commit=${GITHUB_SHA}"
          echo "image=${{ needs.build.outputs.image_ref }}"
          echo "digest=${{ needs.build.outputs.image_digest }}"
          cat release-manifest.json

      - name: Copy deploy files to stage host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/compose.remote.yml,scripts/deploy-remote.sh
          target: ${{ vars.DEPLOY_ROOT }}

      - name: Deploy to stage
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT }}
          COMPOSE_FILE_PATH: ${{ vars.DEPLOY_ROOT }}/deploy/compose.remote.yml
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          APP_IMAGE: ${{ needs.build.outputs.image_ref }}
          APP_PORT: ${{ vars.APP_PORT }}
          SMOKE_URL: ${{ vars.SMOKE_URL }}
          GHCR_REGISTRY: ${{ env.REGISTRY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_ROOT,COMPOSE_FILE_PATH,COMPOSE_PROJECT_NAME,APP_IMAGE,APP_PORT,SMOKE_URL,GHCR_REGISTRY,GHCR_USERNAME,GHCR_TOKEN,DATABASE_USER,DATABASE_PASSWORD,DATABASE_NAME,JWT_SECRET,JWT_REFRESH_SECRET
          script: |
            chmod +x "${DEPLOY_ROOT}/scripts/deploy-remote.sh"
            "${DEPLOY_ROOT}/scripts/deploy-remote.sh"
