name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable image tag to deploy, for example sha-<commit>
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy_production:
    runs-on: self-hosted
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print deploy info
        run: |
          echo "commit=${GITHUB_SHA}"
          echo "image_tag=${{ inputs.image_tag }}"
          echo "target=production"

      - name: Sync production app secret
        run: |
          kubectl create secret generic coffee-app-secrets \
            --namespace coffee-prod \
            --from-literal=DATABASE_USER='${{ secrets.DATABASE_USER }}' \
            --from-literal=DATABASE_PASSWORD='${{ secrets.DATABASE_PASSWORD }}' \
            --from-literal=DATABASE_NAME='${{ secrets.DATABASE_NAME }}' \
            --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            --from-literal=JWT_REFRESH_SECRET='${{ secrets.JWT_REFRESH_SECRET }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync production GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-creds \
            --namespace coffee-prod \
            --docker-server=ghcr.io \
            --docker-username='${{ secrets.GHCR_USERNAME }}' \
            --docker-password='${{ secrets.GHCR_TOKEN }}' \
            --docker-email='ci@example.local' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply production manifests
        run: kubectl apply -k k8s/prod

      - name: Update production image
        run: |
          kubectl set image deployment/coffee-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }} \
            --namespace coffee-prod

      - name: Wait for production rollout
        run: |
          kubectl rollout status deployment/coffee-api \
            --namespace coffee-prod \
            --timeout=180s
