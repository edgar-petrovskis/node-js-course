name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable image tag to deploy, for example sha-<commit>
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy_production:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print deploy info
        run: |
          echo "commit=${GITHUB_SHA}"
          echo "image_tag=${{ inputs.image_tag }}"
          echo "target=production"

      - name: Copy deploy files to production host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/compose.remote.yml,scripts/deploy-remote.sh
          target: ${{ vars.DEPLOY_ROOT }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT }}
          COMPOSE_FILE_PATH: ${{ vars.DEPLOY_ROOT }}/deploy/compose.remote.yml
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          APP_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          APP_PORT: ${{ vars.APP_PORT }}
          SMOKE_URL: ${{ vars.SMOKE_URL }}
          GHCR_REGISTRY: ${{ env.REGISTRY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_ROOT,COMPOSE_FILE_PATH,COMPOSE_PROJECT_NAME,APP_IMAGE,APP_PORT,SMOKE_URL,GHCR_REGISTRY,GHCR_USERNAME,GHCR_TOKEN,DATABASE_USER,DATABASE_PASSWORD,DATABASE_NAME,JWT_SECRET,JWT_REFRESH_SECRET
          script: |
            chmod +x "${DEPLOY_ROOT}/scripts/deploy-remote.sh"
            "${DEPLOY_ROOT}/scripts/deploy-remote.sh"
